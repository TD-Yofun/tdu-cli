version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/TD-Yofun/tdu-cli/cmd.version={{.Version}}
    binary: tdu

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: tdu
    binaries:
      - tdu
    homepage: "https://github.com/TD-Yofun/tdu-cli"
    description: "talkdesk utils - a collection of daily work utilities"
    caveats: |
      This cask downloads from a private GitHub repository.
      You must set HOMEBREW_GITHUB_API_TOKEN in your shell profile:

        export HOMEBREW_GITHUB_API_TOKEN=your_github_personal_access_token
    custom_block: |
      module GitHubPrivateRepo
        def self.token
          github_token = ENV["HOMEBREW_GITHUB_API_TOKEN"]
          raise "HOMEBREW_GITHUB_API_TOKEN is not set. See: brew info tdu" if github_token.nil? || github_token.empty?
          github_token
        end

        def self.release_asset_url(tag, name)
          require "json"
          require "net/http"
          require "uri"

          uri = URI.parse("https://api.github.com/repos/TD-Yofun/tdu-cli/releases/tags/#{tag}")
          http = Net::HTTP.new(uri.host, uri.port)
          http.use_ssl = true
          request = Net::HTTP::Get.new(uri)
          request["Accept"] = "application/vnd.github+json"
          request["Authorization"] = "Bearer #{token}"
          request["X-GitHub-Api-Version"] = "2022-11-28"
          response = http.request(request)
          release = JSON.parse(response.body)
          assets = release["assets"]
          raise "No assets found in release #{tag}. Check your HOMEBREW_GITHUB_API_TOKEN has access to TD-Yofun/tdu-cli." if assets.nil?
          asset = assets.find { |a| a["name"] == name }
          raise "Asset #{name} not found in release #{tag}" if asset.nil?
          asset["url"]
        end
      end
    url:
      template: '#{GitHubPrivateRepo.release_asset_url("v{{.Version}}", "{{.ArtifactName}}")}'
      headers:
        - "Accept: application/octet-stream"
        - "Authorization: Bearer #{GitHubPrivateRepo.token}"
        - "X-GitHub-Api-Version: 2022-11-28"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tdu"]
          end
    repository:
      owner: TD-Yofun
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
