version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/TD-Yofun/tdu-cli/cmd.version={{.Version}}
    binary: tdu

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: tdu
    binaries:
      - tdu
    homepage: "https://github.com/TD-Yofun/tdu-cli"
    description: "talkdesk utils - a collection of daily work utilities"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/tdu"]
          end
    repository:
      owner: TD-Yofun
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
